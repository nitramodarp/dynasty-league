# Add this job to your existing daily-sync.yml
# OR save as .github/workflows/sync-standings.yml for a standalone workflow.
#
# Runs every Monday at 7 AM ET (12:00 UTC).
# Uses the same secrets as daily-sync.yml.

name: Sync Standings

on:
  schedule:
    - cron: '0 12 * * 1'   # Monday 7 AM ET
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

jobs:
  sync-standings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > service-account.json

      - name: Run sync_standings.js
        env:
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          GOOGLE_KEY_PATH: ./service-account.json
        run: node sync_standings.js

      - name: Clean up key file
        if: always()
        run: rm -f service-account.json
