# .github/workflows/sync-team-stats.yml
# Runs Mondays at 7 AM ET (same as standings) plus manual trigger.

name: Sync Team Stats

on:
  schedule:
    - cron: '0 12 * * 1'   # Monday 7 AM ET
  workflow_dispatch:

jobs:
  sync-team-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Write Google service account key
        run: echo '${{ secrets.GOOGLE_KEY_JSON }}' > service-account.json

      - name: Run sync_team_stats.js
        env:
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
          GOOGLE_KEY_PATH: ./service-account.json
        run: node sync_team_stats.js

      - name: Clean up key file
        if: always()
        run: rm -f service-account.json
